const colorMap = {
  'allow-proven': '#81d8d0',
  'allow-unproven': '#c4a87c',
  'deny': '#e06060'
};

function linkColor(d) {
  const name = d.target.name || '';
  return colorMap[name] || '#555';
}

function parseLog(text) {
  const lines = text.trim().split('\n').filter(l => l.length > 0);
  const entries = lines.map(l => JSON.parse(l));
  const agents = new Map();
  const decisionCounts = new Map();
  const actionCounts = new Map();

  for (const e of entries) {
    if (e.event === 'issuance' && e.sub && e.iss && e.role) {
      const depth = (e.parent_chain || []).length;
      agents.set(e.sub, { iss: e.iss, role: e.role, depth });
    }
    if (e.event === 'decision' && e.agentJti && e.decision) {
      if (!decisionCounts.has(e.agentJti)) decisionCounts.set(e.agentJti, new Map());
      const m = decisionCounts.get(e.agentJti);
      m.set(e.decision, (m.get(e.decision) || 0) + 1);
      if (e.action) {
        if (!actionCounts.has(e.agentJti)) actionCounts.set(e.agentJti, new Map());
        const a = actionCounts.get(e.agentJti);
        a.set(e.action, (a.get(e.action) || 0) + 1);
      }
    }
  }

  const nodeNames = [];
  const nodeIndex = name => {
    let i = nodeNames.indexOf(name);
    if (i === -1) { i = nodeNames.length; nodeNames.push(name); }
    return i;
  };
  const links = [];

  for (const [id, info] of agents) {
    const total = [...(decisionCounts.get(id)?.values() || [])].reduce((a, b) => a + b, 0) || 1;
    links.push({ source: nodeIndex(info.iss), target: nodeIndex(id), value: total });
  }
  for (const [id, decs] of decisionCounts) {
    for (const [dec, cnt] of decs) {
      links.push({ source: nodeIndex(id), target: nodeIndex(dec), value: cnt });
    }
  }
  for (const [id, acts] of actionCounts) {
    for (const [act, cnt] of acts) {
      links.push({ source: nodeIndex(id), target: nodeIndex('action:' + act), value: cnt });
    }
  }

  return { nodes: nodeNames.map((n, i) => ({ name: n, index: i })), links };
}

function renderSankey(nodes, links) {
  const container = document.getElementById('chart');
  container.innerHTML = '';
  const width = container.clientWidth || 1200;
  const height = 600;
  const svg = d3.select('#chart').append('svg').attr('width', width).attr('height', height);
  const sankey = d3.sankey().nodeWidth(20).nodePadding(10).extent([[40, 40], [width - 40, height - 40]]);

  const graph = sankey({
    nodes: nodes.map(d => ({ ...d })),
    links: links.map(d => ({ ...d }))
  });

  const tooltip = document.getElementById('tooltip');

  svg.append('g').selectAll('.link')
    .data(graph.links).enter().append('path')
    .attr('class', 'link')
    .attr('d', d3.sankeyLinkHorizontal())
    .attr('stroke', linkColor)
    .attr('stroke-width', d => Math.max(1, d.width))
    .on('mouseover', (ev, d) => {
      tooltip.style.display = 'block';
      tooltip.innerHTML = d.source.name + ' → ' + d.target.name + ': <b>' + d.value + '</b>';
    })
    .on('mousemove', ev => {
      tooltip.style.left = (ev.pageX + 12) + 'px';
      tooltip.style.top = (ev.pageY - 20) + 'px';
    })
    .on('mouseout', () => { tooltip.style.display = 'none'; });

  const node = svg.append('g').selectAll('.node')
    .data(graph.nodes).enter().append('g').attr('class', 'node');

  node.append('rect')
    .attr('x', d => d.x0).attr('y', d => d.y0)
    .attr('height', d => Math.max(1, d.y1 - d.y0))
    .attr('width', sankey.nodeWidth())
    .attr('fill', d => colorMap[d.name] || (d.name.startsWith('action:') ? '#666' : '#c4a87c'))
    .attr('stroke', '#0a0a0a')
    .on('click', (ev, d) => {
      // Filter: highlight only links connected to this node
      svg.selectAll('.link')
        .attr('stroke-opacity', l => (l.source === d || l.target === d) ? 0.7 : 0.05);
    });

  // Double-click to reset
  svg.on('dblclick', () => {
    svg.selectAll('.link').attr('stroke-opacity', 0.4);
  });

  node.append('text')
    .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
    .attr('y', d => (d.y0 + d.y1) / 2)
    .attr('dy', '0.35em')
    .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
    .text(d => d.name.replace('action:', '⚡'));
}

// Initial render with sample data
const { nodes, links } = parseLog(SAMPLE_LOG);
renderSankey(nodes, links);

function regenerate() {
  const text = document.getElementById('logInput').value;
  if (!text.trim()) return;
  try {
    const { nodes, links } = parseLog(text);
    renderSankey(nodes, links);
  } catch (e) {
    alert('Parse error: ' + e.message);
  }
}
